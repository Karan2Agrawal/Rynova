<!DOCTYPE html>
<html>
<head>
    <title>Header Footer Layout</title>
    <style>
        /* body {
            margin: 0;
            font-family: Arial;
        } */

        header {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 15px;
        }

        footer {
            background-color: #333;
            color: rgb(163, 47, 47);
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 15px;
            width: 100%;
        }

        .container {
            display: flex;
            height: 500px;
            justify-content: space-between;
        }

        .box {
            flex: 1;
            padding: 20px;
            text-align: center;
        }

        .left {
            background-color: lightblue;
        }

        .right {
            background-color: lightgreen;
        }
    </style>
</head>

<body>

<header>
    <h1>My Header</h1>
</header>

<div class="container">
    <div class="box left">
        Lelf Div
    </div>
    <div class="box right">
        Right Div
    </div>
</div>

<footer>
    <p>My Footer</p>
</footer>

</body>
</html>
